<!doctype html><html lang="en"><head>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23C8A24B'/%3E%3Ctext x='16' y='23' font-size='20' text-anchor='middle' fill='%23111' font-family='Arial' font-weight='bold'%3EJ%3C/text%3E%3C/svg%3E"><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/><title>Jarvis</title>
<meta name="theme-color" content="#0d1017"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Jarvis"/>
<style>
:root{--bg:#0d1017;--panel:#161b25;--p2:#1d2330;--line:#2a3140;--ink:#e6ebf2;--mut:#8b97a8;
--p0:#ef4444;--p1:#f59e0b;--pp2:#3b82f6;--p3:#6b7280;--ok:#22c55e;--rev:#a855f7;--blk:#ef4444;--prog:#f59e0b;--acc:#3b82f6}
*{box-sizing:border-box}html,body{margin:0;height:100%}body{background:var(--bg);color:var(--ink);font:14px/1.5 ui-sans-serif,system-ui,Segoe UI,Arial}
#login{height:100%;display:grid;place-items:center}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:26px;width:330px}
.card h1{margin:.2em 0 1em;font-size:20px;display:flex;align-items:center;gap:10px}
.logo{width:32px;height:32px;border-radius:9px;background:radial-gradient(circle at 30% 30%,#3b82f6,#1e3a8a);display:grid;place-items:center;font-weight:800;color:#fff}
input,textarea{width:100%;background:var(--p2);border:1px solid var(--line);color:var(--ink);border-radius:9px;padding:10px 12px;font:inherit;outline:none}
input:focus,textarea:focus{border-color:var(--acc)}
button{background:var(--acc);color:#fff;border:0;border-radius:9px;padding:10px 14px;font:inherit;font-weight:600;cursor:pointer}
button:disabled{opacity:.5;cursor:default}
.err{color:#fca5a5;font-size:12.5px;min-height:16px}
#app{display:none;height:100%}
#app.on{display:grid;grid-template-rows:auto 1fr;grid-template-columns:1fr minmax(320px,380px);grid-template-areas:"top top" "content chat";height:100%}
/* chat = PERMANENT right-hand panel (two-region layout); always visible NEXT TO the active view, both usable at once */
#chat{grid-area:chat!important;display:flex!important;flex-direction:column;border-left:1px solid var(--line);background:var(--panel);min-height:0}
@media(max-width:820px){#app.on{grid-template-columns:1fr;grid-template-areas:"top" "content" "chat"}#chat{max-height:42vh;border-left:0;border-top:1px solid var(--line)}}
/* ===== FULLSCREEN CHAT: collapse the panels, chat fills the width ===== */
#app.on.chat-full{grid-template-columns:1fr;grid-template-areas:"top" "chat"}
#app.on.chat-full #pending,#app.on.chat-full #board,#app.on.chat-full #opshub,#app.on.chat-full #agents{display:none!important}
#app.on.chat-full #chat{border-left:0}
@media(max-width:820px){#app.on.chat-full #chat{max-height:none;border-top:0}}
#chatFullBtn{font-size:11px;padding:3px 8px}
header{grid-area:top;display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#11151d,#0d1017)}
header h1{font-size:16px;margin:0}header .sub{color:var(--mut);font-size:11.5px}
.spacer{margin-left:auto}.ghost{background:transparent;border:1px solid var(--line);color:var(--mut);font-weight:500;padding:6px 11px}
.ghost.active{color:#7dd3fc;border-color:#0ea5e9}
/* pending-for-you panel */
#pending{grid-area:pending;display:none;background:linear-gradient(180deg,#1a1510,#161b25);border-bottom:1px solid var(--line);padding:10px 14px}
#pending .ph{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:#fcd34d;margin-bottom:8px;display:flex;gap:8px;align-items:center}
#pending .ph .n{background:#f59e0b22;color:#fcd34d;border-radius:20px;padding:0 8px;font-size:11px}
#pending .pq{display:flex;gap:9px;overflow-x:auto;padding-bottom:2px}
.pgrp{margin-bottom:10px}.pgrp:last-child{margin-bottom:0}
.pgrp.comp .ph{color:#7dd3fc}
.pgrp.comp .qcard{border-color:#0ea5e955;border-left-color:var(--acc)}
.pgrp.comp .qans{color:#7dd3fc}
.qcard{flex:0 0 auto;width:230px;text-align:left;background:var(--p2);border:1px solid #f59e0b55;border-left:3px solid var(--p1);border-radius:9px;padding:8px 10px;color:var(--ink);font:inherit;cursor:pointer}
.qcard .qid{color:var(--mut);font-size:10px;font-weight:700;letter-spacing:.4px}
.qcard .qt{font-weight:600;font-size:12.5px;margin:2px 0 4px;white-space:normal}
.qcard .qa{font-size:11px;color:var(--mut);white-space:normal}
.qcard .qans{font-size:10.5px;color:#fcd34d;margin-top:5px}
#board{grid-area:board;overflow:auto;padding:14px;display:grid;grid-auto-flow:column;grid-auto-columns:minmax(220px,1fr);gap:12px;align-items:start}
.col{background:var(--panel);border:1px solid var(--line);border-radius:12px;min-height:80px;display:flex;flex-direction:column}
.col h2{font-size:12px;text-transform:uppercase;letter-spacing:.6px;margin:0;padding:11px 12px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between}
.col .n{color:var(--mut);background:var(--p2);border-radius:20px;padding:0 8px;font-size:11px}
.drop{padding:10px;display:flex;flex-direction:column;gap:9px;flex:1}.drop.over{background:#3b82f611;outline:1.5px dashed #3b82f655;outline-offset:-6px}
.tk{background:var(--p2);border:1px solid var(--line);border-left-width:3px;border-radius:9px;padding:9px 10px;cursor:grab}
.tk:active{cursor:grabbing}.tk .id{color:var(--mut);font-size:10px;font-weight:700;letter-spacing:.4px}
.tk .t{font-weight:600;margin:2px 0 6px;font-size:13px}.tk .m{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.tag{font-size:10px;border-radius:6px;padding:1px 6px;border:1px solid var(--line);color:var(--mut)}
.P0{background:#ef444422;color:#fca5a5}.P1{background:#f59e0b22;color:#fcd34d}.P2{background:#3b82f622;color:#93c5fd}.P3{background:#6b728022;color:#cbd5e1}
.own{font-size:10px;color:#7dd3fc;background:#0ea5e918;border:1px solid #0ea5e955;border-radius:20px;padding:0 7px}
.na{font-size:11px;color:#fca5a5;margin-top:5px}.nt{font-size:11px;color:var(--mut);margin-top:5px}
.b-blocked{border-left-color:var(--blk)}.b-in_progress{border-left-color:var(--prog)}.b-in_review{border-left-color:var(--rev)}.b-backlog{border-left-color:var(--p3)}.b-done{border-left-color:var(--ok);opacity:.78}
#chat{grid-area:chat;border-left:1px solid var(--line);display:flex;flex-direction:column;background:var(--panel)}
#chat h2{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--mut);margin:0;padding:12px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
#msgs{flex:1;overflow:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:90%;padding:8px 11px;border-radius:11px;font-size:13px;white-space:pre-wrap;word-wrap:break-word}
.msg.user{align-self:flex-end;background:var(--acc);color:#fff;border-bottom-right-radius:3px}
.msg.jarvis{align-self:flex-start;background:var(--p2);border:1px solid var(--line);border-bottom-left-radius:3px}
.msg .who{font-size:9.5px;opacity:.6;margin-bottom:2px;text-transform:uppercase;letter-spacing:.5px}
.msg .who .mtime{margin-left:7px;font-weight:600;opacity:.9;font-variant-numeric:tabular-nums;letter-spacing:0}
.msg .mc{white-space:pre-wrap;word-wrap:break-word}
.mact{display:flex;gap:6px;margin-top:6px}
.mbtn{background:transparent;border:1px solid var(--line);color:var(--mut);border-radius:7px;padding:3px 9px;font-size:11px;font-weight:600;cursor:pointer}
.msg.user .mbtn{border-color:#ffffff66;color:#eef}
#ttsStop{display:none;color:#fca5a5;border-color:#ef444455}
#ttsStop:hover{background:#ef444422;color:#fecaca}
body.speaking #ttsStop{display:inline-flex;align-items:center}
.ag-act{margin-top:2px;padding-top:9px;border-top:1px solid var(--line)}
.pending{align-self:flex-start;color:var(--mut);font-size:12px;font-style:italic}
.compose{border-top:1px solid var(--line);padding:10px;display:flex;gap:8px;align-items:flex-end}
.compose textarea{resize:none;min-height:88px;max-height:260px;line-height:1.45;padding:12px 14px}
.iconbtn{background:var(--p2);border:1px solid var(--line);color:var(--mut);border-radius:9px;padding:10px 13px;font-size:17px;line-height:1}
.iconbtn.rec{background:#ef444422;border-color:#ef4444;color:#fca5a5;animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.45}}
.tts{font-size:11px;padding:5px 9px}
@media(max-width:820px){
  header{padding:10px 12px;gap:8px}
  header h1{font-size:15px}header .sub{display:none}
  #chat{max-height:48vh}
  .compose textarea{min-height:54px}
}
@media(max-width:560px){
  header{flex-wrap:wrap;gap:6px 8px}
  .tabs{margin-left:0;order:3;width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
  .tab{padding:6px 10px;flex:0 0 auto}.tab .lbl{display:none}
  .spacer{display:none}
  .ghost{padding:5px 8px;font-size:11px}
  #refreshBtn{display:none} /* redundant on phone — the board auto-polls every 4s */
  #brandImg{height:22px}
  .msg{max-width:94%;font-size:13.5px}
  #msgs{padding:10px;gap:8px}
  .compose{padding:8px;gap:6px}.compose textarea{min-height:46px;padding:9px 11px}
  .iconbtn{padding:9px 12px}
  #board{padding:10px;gap:10px}
  #chat h2{padding:10px}
}
/* change-password modal */
#pwModal{display:none;position:fixed;inset:0;z-index:50;background:rgba(6,9,14,.72);place-items:center;padding:16px}
#pwModal.on{display:grid}
#pwModal .card{width:100%;max-width:330px}
#pwModal .err{color:var(--mut)}
#pwModal .err.bad{color:#fca5a5}
#pwModal .err.ok{color:#86efac}
/* ===== OPS HUB + unified view-tab nav (Phase-1 local preview) ===== */
#opshub{overflow:hidden}
/* single-view tab model: exactly one of pending/board/chat/opshub shown, filling the content area */
#pending,#board,#opshub,#agents{grid-area:content;min-height:0}
#app[data-view] #pending,#app[data-view] #board,#app[data-view] #opshub,#app[data-view] #agents{display:none!important}
#app[data-view="pending"] #pending{display:block!important;overflow:auto}
#app[data-view="board"] #board{display:grid!important}
#app[data-view="ops"] #opshub{display:flex!important;flex-direction:column}
#app[data-view="agents"] #agents{display:block!important;overflow:auto}
/* ===== AGENTS tab (live by-agent kanban from Supabase jarvis_agents) ===== */
.ag-wrap{padding:18px 20px}
.ag-h{margin:0 0 14px;font-size:17px}
.ag-h .sub{font-weight:400;color:var(--mut);font-size:12.5px;margin-left:8px}
.ag-cols{display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap}
.ag-col{flex:0 0 244px;max-width:264px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px;display:flex;flex-direction:column;gap:10px}
.ag-head{display:flex;align-items:center;justify-content:space-between;gap:8px}
.ag-id{display:flex;align-items:center;gap:9px;min-width:0}
.ag-av{width:30px;height:30px;border-radius:8px;background:#0ea5e91f;color:#7dd3fc;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex:none}
.ag-name{font-weight:700;font-size:13.5px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ag-meta{font-size:11px;color:var(--mut)}
.ag-pill{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;letter-spacing:.03em;padding:3px 8px;border-radius:999px;white-space:nowrap;flex:none}
.ag-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.ag-card{background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:10px}
.ag-task-l{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--mut);margin-bottom:3px}
.ag-task{font-size:13px;color:var(--ink);line-height:1.35}
.ag-block{margin-top:8px;font-size:11.5px;color:#f87171;background:rgba(239,68,68,.10);border:1px solid rgba(239,68,68,.3);border-radius:7px;padding:5px 7px}
.ag-upd{margin-top:8px;font-size:10.5px;color:var(--mut)}
.ag-err{color:var(--mut);font-size:13px}
.ag-seen{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--mut)}
.ag-live{width:7px;height:7px;border-radius:50%;background:#22c55e;box-shadow:0 0 0 2px rgba(34,197,94,.22);flex:none}
.ag-live.off{background:#6b7280;box-shadow:none}
.ag-col.off{opacity:.58}
.ag-col.off .ag-name{color:var(--mut)}
.tabs{display:flex;gap:2px;margin-left:6px;background:var(--p2);border:1px solid var(--line);border-radius:10px;padding:3px}
.tab{background:transparent;border:0;color:var(--mut);border-radius:7px;padding:6px 11px;font-size:13px;font-weight:600;cursor:pointer;line-height:1;white-space:nowrap;display:flex;align-items:center;gap:6px}
.tab:hover{color:var(--ink)}
.tab.on{background:#0ea5e91f;color:#7dd3fc;box-shadow:inset 0 0 0 1px #0ea5e955}
/* GSCCTV branding — only while the Ops Hub tab is active */
#brandImg{width:34px;height:34px;border-radius:8px;object-fit:contain;display:none}
#app[data-view="ops"] #brandBadge{display:none}
#app[data-view="ops"] #brandImg{display:block}
#app[data-view="ops"] .tab[data-view="ops"].on{background:rgba(200,162,75,.16);color:#e7cd84;box-shadow:inset 0 0 0 1px rgba(200,162,75,.5)}
#opshub .oh-inc-proj,#opshub .oh-tk-p{color:#C8A24B}
#opshub .oh-proj.over{border-color:#C8A24B;background:rgba(200,162,75,.10);outline-color:rgba(200,162,75,.5)}
#opshub .oh-wdrop.over{background:rgba(200,162,75,.10);outline-color:rgba(200,162,75,.5)}
.oh-top{border-bottom-color:rgba(200,162,75,.35)}
.oh-groupby{display:flex;align-items:center;gap:2px;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:2px 2px 2px 8px}
.ohg-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--mut);margin-right:4px}
.ohg{background:transparent;border:0;color:var(--mut);border-radius:6px;padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.ohg:hover{color:var(--ink)}
.ohg.on{background:rgba(200,162,75,.16);color:#e7cd84}
.oh-stagechip{font-size:10px;border-radius:6px;padding:1px 6px;border:1px solid var(--line);color:var(--mut)}
.oh-stagechip.s-new{color:#cbd5e1}.oh-stagechip.s-in_progress{color:#fcd34d;border-color:#f59e0b55}.oh-stagechip.s-review{color:#d8b4fe;border-color:#a855f755}.oh-stagechip.s-done{color:#86efac;border-color:#22c55e55}
.oh-top{display:flex;align-items:center;gap:12px;padding:9px 14px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#11151d,#0d1017);flex:0 0 auto;flex-wrap:wrap}
.oh-top h2{font-size:14px;margin:0;display:flex;align-items:center;gap:8px}
.oh-top .sub{color:var(--mut);font-size:11px;font-weight:400}
.oh-sel{background:var(--p2);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:6px 10px;font:inherit}
.oh-legend{display:flex;gap:11px;margin-left:auto;align-items:center;color:var(--mut);font-size:11.5px;flex-wrap:wrap}
.oh-sw{width:9px;height:9px;border-radius:3px;display:inline-block;margin-right:5px;vertical-align:middle}
.oh-av{width:22px;height:22px;border-radius:50%;display:inline-grid;place-items:center;font-size:10.5px;font-weight:700;color:#fff;flex:none}
.oh-J{background:linear-gradient(135deg,#5b8cff,#7c5cff)}.oh-T{background:linear-gradient(135deg,#ff8f5b,#ff5d6c)}.oh-A{background:linear-gradient(135deg,#2fce8f,#1c8f63)}.oh-R{background:linear-gradient(135deg,#f59e0b,#b45309)}
.oh-body{flex:1;min-height:0;display:grid;grid-template-columns:290px 300px 1fr}
.oh-pane{border-right:1px solid var(--line);display:flex;flex-direction:column;min-height:0}
.oh-pane:last-child{border-right:0}
.oh-ph{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--mut);padding:10px 12px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;flex:0 0 auto}
.oh-ph .n{background:var(--p2);border-radius:20px;padding:0 8px;font-size:11px}
.oh-scroll{overflow:auto;padding:10px;flex:1;min-height:0}
.oh-grp{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--mut);margin:8px 2px 6px}
.oh-inc{background:var(--p2);border:1px solid var(--line);border-radius:9px;padding:8px 10px;margin-bottom:8px;cursor:grab}
.oh-inc:active{cursor:grabbing}.oh-inc.gone{opacity:.4;filter:saturate(.4);cursor:default}
.oh-inc-top{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.oh-pill{font-size:10px;font-weight:600;border-radius:20px;padding:1px 7px}
.ch-phone{background:rgba(47,206,143,.16);color:#5fe0a6}.ch-chat{background:rgba(91,140,255,.16);color:#9fb8ff}.ch-web{background:rgba(124,92,255,.18);color:#bda6ff}.ch-email{background:rgba(245,158,11,.16);color:#fcd34d}.ch-wom{background:rgba(255,93,108,.16);color:#ff9aa4}
.oh-time{margin-left:auto;color:var(--mut);font-size:10px}
.oh-inc-name{font-weight:600;font-size:12.5px}
.oh-inc-sum{color:var(--mut);font-size:11.5px;line-height:1.4;margin:2px 0 4px}
.oh-inc-proj{font-size:10.5px;color:#7dd3fc}
.oh-note{color:var(--mut);font-size:11px;padding:9px 4px 2px;border-top:1px dashed var(--line);margin-top:6px}
.oh-proj{background:var(--p2);border:1px solid var(--line);border-radius:10px;margin-bottom:8px;overflow:hidden}
.oh-proj.over{border-color:#0ea5e9;background:#0ea5e914;outline:1.5px dashed #0ea5e955;outline-offset:-4px}
.oh-proj-h{display:flex;align-items:center;gap:8px;padding:9px 10px;cursor:pointer}
.oh-proj-h:hover{background:#ffffff08}
.oh-ct{transition:.2s;color:var(--mut);font-size:11px}.oh-proj.col .oh-ct{transform:rotate(-90deg)}.oh-proj.col .oh-proj-b{display:none}
.oh-proj-nm{font-weight:600;font-size:12.5px}.oh-proj-su{font-size:10.5px;color:var(--mut)}
.oh-pct{margin-left:auto;font-weight:800;font-size:12px;padding:2px 8px;border-radius:20px}
.oh-green{background:rgba(34,197,94,.18);color:#86efac}.oh-red{background:rgba(239,68,68,.16);color:#fca5a5}
.oh-proj-b{padding:0 10px 8px}
.oh-subx{margin-top:6px}.oh-sub-h{font-size:9.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--mut);margin-bottom:3px;display:flex;justify-content:space-between}
.oh-sub-i{display:flex;align-items:center;gap:6px;font-size:11.5px;padding:3px 6px;border-radius:6px;background:var(--bg);margin-bottom:3px}
.oh-dot{width:6px;height:6px;border-radius:50%;flex:none}.oh-d-done{background:var(--ok)}.oh-d-open{background:var(--p1)}
.oh-sub-i .tt{flex:1}.oh-sub-i.dn .tt{text-decoration:line-through;color:var(--mut)}
.oh-sub-e{font-size:10.5px;color:var(--mut);font-style:italic;padding:1px 6px}
.oh-wf{height:100%;display:grid;grid-auto-flow:column;grid-auto-columns:minmax(210px,1fr);gap:10px;padding:10px;overflow:auto}
.oh-wcol{background:var(--panel);border:1px solid var(--line);border-radius:11px;display:flex;flex-direction:column;min-height:80px}
.oh-wh{font-size:11px;text-transform:uppercase;letter-spacing:.5px;padding:9px 11px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between}
.oh-wh .n{color:var(--mut);background:var(--p2);border-radius:20px;padding:0 7px;font-size:10.5px}
.oh-wdrop{padding:9px;display:flex;flex-direction:column;gap:8px;flex:1;overflow:auto;min-height:40px}
.oh-wdrop.over{background:#3b82f611;outline:1.5px dashed #3b82f655;outline-offset:-6px}

/* ===== AGENTS tab — live by-agent view from Supabase jarvis_agents (read-only, polls 15s) ===== */
(function(){
  let timer=null;
  const PILL={
    WORKING:{bg:'rgba(245,158,11,.15)',fg:'#f5b54a',br:'rgba(245,158,11,.5)',dot:'#f59e0b',lbl:'WORKING'},
    IDLE:{bg:'rgba(139,151,168,.14)',fg:'#8b97a8',br:'rgba(139,151,168,.4)',dot:'#8b97a8',lbl:'IDLE'},
    BLOCKED:{bg:'rgba(239,68,68,.15)',fg:'#f87171',br:'rgba(239,68,68,.5)',dot:'#ef4444',lbl:'BLOCKED'}
  };
  const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const initial=n=>{const h=String(n||'').split('/').pop()||'?';return h[0]?h[0].toUpperCase():'?';};
  async function render(){
    const wrap=$("#agents"); if(!wrap)return;
    const {data,error}=await sb.from("jarvis_agents").select("*").order("name");
    if(error){wrap.innerHTML='<div class="ag-wrap"><h2 class="ag-h">🧑‍💻 Agents</h2><p class="ag-err">Could not load agents.</p></div>';return;}
    const rows=data||[];
    const now=Date.now(), ONLINE_MS=15*60*1000; // seen within 15 min = online (updated_at refreshed on activity)
    const rel=ms=>{const s=Math.round(ms/1000);if(s<60)return s+'s ago';const m=Math.round(s/60);if(m<60)return m+'m ago';const h=Math.floor(m/60);if(h<24)return h+'h ago';return Math.floor(h/24)+'d ago';};
    let onlineCount=0;
    const cols=rows.map(a=>{
      const p=PILL[String(a.status||'').toUpperCase()]||PILL.IDLE;
      const t=a.updated_at?new Date(a.updated_at).getTime():null;
      const age=t?now-t:null;
      const online=age!=null&&age<ONLINE_MS; if(online)onlineCount++;
      const seenTxt=age==null?'last seen unknown':(online?'online now':'last seen '+rel(age));
      const upd=t?new Date(t).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'';
      return `<div class="ag-col${online?'':' off'}">
        <div class="ag-head">
          <div class="ag-id"><span class="ag-av">${esc(initial(a.name))}</span>
            <div><div class="ag-name">${esc(a.name)}</div><div class="ag-meta">${esc(a.machine||'')} · ${esc(a.lane||'')}</div></div>
          </div>
          <span class="ag-pill" style="background:${p.bg};color:${p.fg};box-shadow:inset 0 0 0 1px ${p.br}"><span class="ag-dot" style="background:${p.dot}"></span>${p.lbl}</span>
        </div>
        <div class="ag-seen"><span class="ag-live${online?'':' off'}"></span>${esc(seenTxt)}</div>
        <div class="ag-card">
          <div class="ag-task-l">Task at hand</div>
          <div class="ag-task">${esc(a.current_task||'—')}</div>
          ${a.blocked_on?`<div class="ag-block">⛔ Blocked on: ${esc(a.blocked_on)}</div>`:''}
          ${upd?`<div class="ag-upd">updated ${esc(upd)}</div>`:''}
        </div>
        <div class="mact ag-act"><button class="mbtn" data-aact="reply">↩ Reply</button><button class="mbtn" data-aact="read">🔊 Read</button><button class="mbtn" data-aact="copy">⧉ Copy</button></div>
      </div>`;
    }).join("");
    wrap.innerHTML=`<div class="ag-wrap">
      <h2 class="ag-h">🧑‍💻 Agents <span class="sub">who's on what right now · live · ${onlineCount}/${rows.length} online</span></h2>
      <div class="ag-cols">${cols||'<p class="ag-err">No agents yet.</p>'}</div>
    </div>`;
  }
  // agent-card action buttons (delegated — #agents container is stable across re-renders)
  $("#agents").addEventListener("click",e=>{
    const btn=e.target.closest(".ag-act .mbtn");if(!btn)return;
    const col=btn.closest(".ag-col");if(!col)return;
    const name=(col.querySelector(".ag-name")?.textContent||"").trim();

  });
  window._agentsInit=function(){ render(); if(!timer)timer=setInterval(()=>{ if($("#app").getAttribute("data-view")==="agents")render(); },15000); };
})();

function renderBoard(){
  const b=$("#board");b.innerHTML="";
  let open=0;
  COLS.forEach(([key,label])=>{
    const items=tickets.filter(x=>x.status===key);

    drop.addEventListener("dragover",e=>{e.preventDefault();drop.classList.add("over");});
    drop.addEventListener("dragleave",()=>drop.classList.remove("over"));
    drop.addEventListener("drop",async e=>{e.preventDefault();drop.classList.remove("over");
      const id=e.dataTransfer.getData("text");if(!id)return;
      const tk=tickets.find(x=>x.id===id);if(tk&&tk.status!==key){tk.status=key;renderPending();renderBoard();
        await sb.from("jarvis_tickets").update({status:key,updated_at:new Date().toISOString()}).eq("id",id);
        await sb.from("jarvis_messages").insert({role:"user",content:`[board] moved ${id} → ${key}`,ticket_id:id,handled:true});

      drop.appendChild(c);

    col.appendChild(drop);b.appendChild(col);

/* ---- read-aloud (TTS) ---- */
let ttsOn=localStorage.getItem("tts")==="1";
const spoken=new Set();let ttsPrimed=false;
/* ---- shared, STOPPABLE text-to-speech (voice-picked + autoplay-unlocked) ---- */
let _voice=null,_audioUnlocked=false;
function pickVoice(){
  if(!("speechSynthesis"in window))return null;
  const vs=speechSynthesis.getVoices()||[];if(!vs.length)return null;
  // prefer clear, natural English voices over the robotic default
  const prefs=[/Google US English/i,/Microsoft.*(Aria|Jenny|Ava|Michelle|Emma|Guy).*(Online|Natural)/i,/Samantha/i,/Google UK English Female/i,/Microsoft.*(Zira|David)/i,/en[-_]US/i,/\ben\b|English/i];
  for(const p of prefs){const m=vs.find(v=>p.test(v.name)||p.test(v.lang));if(m)return m;}
  return vs[0];
}
function ensureVoice(){if(!_voice)_voice=pickVoice();return _voice;}
if("speechSynthesis"in window){speechSynthesis.onvoiceschanged=()=>{_voice=pickVoice();};setTimeout(ensureVoice,300);}
function reflectSpeaking(){try{document.body.classList.toggle("speaking",("speechSynthesis"in window)&&(speechSynthesis.speaking||speechSynthesis.pending));}catch(e){}}
function stopSpeak(){try{speechSynthesis.cancel();}catch(e){}reflectSpeaking();}
function mkUtter(text){const u=new SpeechSynthesisUtterance((text||"").replace(/https?:\/\/\S+/g,"link").replace(/[*_#`>]/g,""));const v=ensureVoice();if(v){u.voice=v;u.lang=v.lang;}u.rate=.96;u.pitch=1;u.volume=1;u.onstart=reflectSpeaking;u.onend=()=>setTimeout(reflectSpeaking,60);u.onerror=()=>setTimeout(reflectSpeaking,60);return u;}
function speak(text){if(!("speechSynthesis"in window))return;try{speechSynthesis.cancel();speechSynthesis.speak(mkUtter(text));reflectSpeaking();}catch(e){}}
// Browsers block speechSynthesis until a user gesture. Unlock on the first tap/click anywhere so
// a persisted "Read: On" actually auto-plays new replies (this was the "toggle on but silent" bug).
function unlockAudio(){if(_audioUnlocked||!("speechSynthesis"in window))return;try{const u=new SpeechSynthesisUtterance(" ");u.volume=0;speechSynthesis.speak(u);_audioUnlocked=true;}catch(e){}}
window.addEventListener("pointerdown",()=>{ensureVoice();unlockAudio();});
function updateTtsBtn(){const b=$("#ttsBtn");b.classList.toggle("active",ttsOn);b.textContent=ttsOn?"🔊 Read: On":"🔇 Read: Off";}
$("#ttsBtn").addEventListener("click",()=>{ttsOn=!ttsOn;localStorage.setItem("tts",ttsOn?"1":"0");
  if(ttsOn){unlockAudio();ensureVoice();
    // this click IS the gesture — read the latest reply now so the voice is confirmed immediately
    const last=[...msgs].reverse().find(m=>m.role==="jarvis"&&!(m.content||"").startsWith("[board]"));
    if(last){spoken.add(last.id);speak(last.content);}
  } else {stopSpeak();}
  updateTtsBtn();});
$("#ttsStop").addEventListener("click",stopSpeak);
function speakNew(){if(!ttsOn||!("speechSynthesis"in window))return;
  msgs.filter(m=>m.role==="jarvis"&&!spoken.has(m.id)&&!(m.content||"").startsWith("[board]")).forEach(m=>{spoken.add(m.id);
    try{speechSynthesis.speak(mkUtter(m.content));}catch(e){}});reflectSpeaking();}

function fmtTime(ts){ if(!ts)return""; try{ const d=new Date(ts),now=new Date(),TZ="America/Los_Angeles"; const t=d.toLocaleTimeString("en-US",{timeZone:TZ,hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false}); const dDay=d.toLocaleDateString("en-US",{timeZone:TZ}),nDay=now.toLocaleDateString("en-US",{timeZone:TZ}); const day=(dDay===nDay)?"":d.toLocaleDateString("en-US",{timeZone:TZ,month:"short",day:"numeric"})+" "; return day+t+" PT"; }catch(e){return"";} }
function renderChat(){
  const box=$("#msgs");const atBottom=box.scrollHeight-box.scrollTop-box.clientHeight<60;
  box.innerHTML="";
  msgs.filter(m=>!(m.content||"").startsWith("[board]")).forEach(m=>{
    const d=document.createElement("div");d.className="msg "+(m.role==="user"?"user":"jarvis");
    d.innerHTML=`<div class="who">${m.role==="user"?"You":"Jarvis"}<span class="mtime">${fmtTime(m.created_at)}</span></div><div class="mc">${esc(m.content)}</div><div class="mact"><button class="mbtn" data-act="reply">↩ Reply</button><button class="mbtn" data-act="read">🔊 Read</button><button class="mbtn" data-act="copy">⧉ Copy</button></div>`;
    box.appendChild(d);
  });
  const unhandled=msgs.some(m=>m.role==="user"&&!m.handled&&!(m.content||"").startsWith("[board]"));
  if(unhandled){const p=document.createElement("div");p.className="pending";p.textContent="Jarvis is on it…";box.appendChild(p);}
  if(atBottom||msgs.length!==lastMsgCount)box.scrollTop=box.scrollHeight;
  lastMsgCount=msgs.length;
  if(!ttsPrimed){msgs.filter(m=>m.role==="jarvis").forEach(m=>spoken.add(m.id));ttsPrimed=true;} else {speakNew();}
}

const SR=window.SpeechRecognition||window.webkitSpeechRecognition;let rec=null,recording=false,userStop=false,micBase="",micFinal="";
function micRender(interim){$("#prompt").value=(micBase+micFinal+(interim||"")).replace(/[ \t]+/g," ").replace(/^ /,"");}
function micStart(){
  rec=new SR();rec.lang="en-US";rec.interimResults=true;rec.continuous=true;
  rec.onstart=()=>{recording=true;$("#micBtn").classList.add("rec");};
  rec.onerror=ev=>{const er=ev&&ev.error;if(er==="not-allowed"||er==="service-not-allowed"){userStop=true;alert("Mic permission is blocked. Allow microphone access for this site, then tap the mic again.");}};
  rec.onend=()=>{if(!userStop){try{rec.start();return;}catch(e){}}recording=false;$("#micBtn").classList.remove("rec");$("#prompt").focus();};
  rec.onresult=e=>{let interim="";for(let i=e.resultIndex;i<e.results.length;i++){const tr=e.results[i][0].transcript;if(e.results[i].isFinal)micFinal+=tr+" ";else interim+=tr;}micRender(interim);};
  try{rec.start();}catch(e){}
}
$("#micBtn").addEventListener("click",()=>{
  if(!SR){alert("Voice input isn’t supported on this browser — type instead. (On iPhone this can be hit-or-miss.)");return;}
  if(recording){userStop=true;try{rec.stop();}catch(e){}return;}
  micBase=($("#prompt").value||"");if(micBase&&!/\s$/.test(micBase))micBase+=" ";micFinal="";userStop=false;
  micStart();
});

$("#msgs").addEventListener("click",e=>{
  const btn=e.target.closest(".mbtn");if(!btn)return;
  const txt=btn.closest(".msg").querySelector(".mc").textContent;
  if(btn.dataset.act==="reply"){const s=txt.slice(0,55).replace(/\s+/g," ");$("#prompt").value=`↳ Re "${s}${txt.length>55?"…":""}": `;$("#prompt").focus();return;}
  if(btn.dataset.act==="read"){speak(txt);}
  else{const done=()=>{const o=btn.textContent;btn.textContent="✓ Copied";setTimeout(()=>btn.textContent=o,1200);};
    if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(done).catch(()=>selFallback(btn));}else selFallback(btn);}
});
function selFallback(btn){const r=document.createRange();r.selectNodeContents(btn.closest(".msg").querySelector(".mc"));const s=getSelection();s.removeAllRanges();s.addRange(r);try{document.execCommand("copy");const o=btn.textContent;btn.textContent="✓ Copied";setTimeout(()=>btn.textContent=o,1200);}catch(_){}}
$("#composeForm").addEventListener("submit",send);
$("#prompt").addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send(e);}});
function autoGrowPrompt(){const t=$("#prompt");if(!t)return;t.style.height="auto";t.style.height=Math.min(t.scrollHeight,260)+"px";}
$("#prompt").addEventListener("input",autoGrowPrompt);
async function sendMsg(v){v=(v||"").trim();if(!v)return;await sb.from("jarvis_messages").insert({role:"user",content:v,handled:false});await load();}
async function send(e){if(e)e.preventDefault();const v=$("#prompt").value.trim();if(!v)return;
  if(recording){userStop=true;try{rec.stop();}catch(e){}}
  $("#prompt").value="";$("#prompt").style.height="";$("#sendBtn").disabled=true;
  await sendMsg(v);
  $("#sendBtn").disabled=false;}

function esc(s){return (s??"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
