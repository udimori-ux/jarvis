<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/><title>Jarvis</title>
<meta name="theme-color" content="#0d1017"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Jarvis"/>
<style>
:root{--bg:#0d1017;--panel:#161b25;--p2:#1d2330;--line:#2a3140;--ink:#e6ebf2;--mut:#8b97a8;
--p0:#ef4444;--p1:#f59e0b;--pp2:#3b82f6;--p3:#6b7280;--ok:#22c55e;--rev:#a855f7;--blk:#ef4444;--prog:#f59e0b;--acc:#3b82f6}
*{box-sizing:border-box}html,body{margin:0;height:100%}body{background:var(--bg);color:var(--ink);font:14px/1.5 ui-sans-serif,system-ui,Segoe UI,Arial}
#login{height:100%;display:grid;place-items:center}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:26px;width:330px}
.card h1{margin:.2em 0 1em;font-size:20px;display:flex;align-items:center;gap:10px}
.logo{width:32px;height:32px;border-radius:9px;background:radial-gradient(circle at 30% 30%,#3b82f6,#1e3a8a);display:grid;place-items:center;font-weight:800;color:#fff}
input,textarea{width:100%;background:var(--p2);border:1px solid var(--line);color:var(--ink);border-radius:9px;padding:10px 12px;font:inherit;outline:none}
input:focus,textarea:focus{border-color:var(--acc)}
button{background:var(--acc);color:#fff;border:0;border-radius:9px;padding:10px 14px;font:inherit;font-weight:600;cursor:pointer}
button:disabled{opacity:.5;cursor:default}
.err{color:#fca5a5;font-size:12.5px;min-height:16px}
#app{display:none;height:100%}
#app.on{display:grid;grid-template-rows:auto auto 1fr;grid-template-columns:1fr 360px;grid-template-areas:"top top" "pending pending" "board chat"}
#app.hide-pending #pending{display:none!important}#app.hide-board #board{display:none!important}#app.hide-chat #chat{display:none!important}
header{grid-area:top;display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#11151d,#0d1017)}
header h1{font-size:16px;margin:0}header .sub{color:var(--mut);font-size:11.5px}
.spacer{margin-left:auto}.ghost{background:transparent;border:1px solid var(--line);color:var(--mut);font-weight:500;padding:6px 11px}
.ghost.active{color:#7dd3fc;border-color:#0ea5e9}
.views{display:flex;gap:5px;margin-left:6px}
.vchip{background:var(--p2);border:1px solid var(--line);color:var(--mut);border-radius:8px;padding:5px 9px;font-size:14px;line-height:1;cursor:pointer}
.vchip.on{background:#0ea5e918;border-color:#0ea5e9;color:#7dd3fc}
/* pending-for-you panel */
#pending{grid-area:pending;display:none;background:linear-gradient(180deg,#1a1510,#161b25);border-bottom:1px solid var(--line);padding:10px 14px}
#pending .ph{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:#fcd34d;margin-bottom:8px;display:flex;gap:8px;align-items:center}
#pending .ph .n{background:#f59e0b22;color:#fcd34d;border-radius:20px;padding:0 8px;font-size:11px}
#pending .pq{display:flex;gap:9px;overflow-x:auto;padding-bottom:2px}
.pgrp{margin-bottom:10px}.pgrp:last-child{margin-bottom:0}
.pgrp.comp .ph{color:#7dd3fc}
.pgrp.comp .qcard{border-color:#0ea5e955;border-left-color:var(--acc)}
.pgrp.comp .qans{color:#7dd3fc}
.qcard{flex:0 0 auto;width:230px;text-align:left;background:var(--p2);border:1px solid #f59e0b55;border-left:3px solid var(--p1);border-radius:9px;padding:8px 10px;color:var(--ink);font:inherit;cursor:pointer}
.qcard .qid{color:var(--mut);font-size:10px;font-weight:700;letter-spacing:.4px}
.qcard .qt{font-weight:600;font-size:12.5px;margin:2px 0 4px;white-space:normal}
.qcard .qa{font-size:11px;color:var(--mut);white-space:normal}
.qcard .qans{font-size:10.5px;color:#fcd34d;margin-top:5px}
#board{grid-area:board;overflow:auto;padding:14px;display:grid;grid-auto-flow:column;grid-auto-columns:minmax(220px,1fr);gap:12px;align-items:start}
.col{background:var(--panel);border:1px solid var(--line);border-radius:12px;min-height:80px;display:flex;flex-direction:column}
.col h2{font-size:12px;text-transform:uppercase;letter-spacing:.6px;margin:0;padding:11px 12px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between}
.col .n{color:var(--mut);background:var(--p2);border-radius:20px;padding:0 8px;font-size:11px}
.drop{padding:10px;display:flex;flex-direction:column;gap:9px;flex:1}.drop.over{background:#3b82f611;outline:1.5px dashed #3b82f655;outline-offset:-6px}
.tk{background:var(--p2);border:1px solid var(--line);border-left-width:3px;border-radius:9px;padding:9px 10px;cursor:grab}
.tk:active{cursor:grabbing}.tk .id{color:var(--mut);font-size:10px;font-weight:700;letter-spacing:.4px}
.tk .t{font-weight:600;margin:2px 0 6px;font-size:13px}.tk .m{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.tag{font-size:10px;border-radius:6px;padding:1px 6px;border:1px solid var(--line);color:var(--mut)}
.P0{background:#ef444422;color:#fca5a5}.P1{background:#f59e0b22;color:#fcd34d}.P2{background:#3b82f622;color:#93c5fd}.P3{background:#6b728022;color:#cbd5e1}
.own{font-size:10px;color:#7dd3fc;background:#0ea5e918;border:1px solid #0ea5e955;border-radius:20px;padding:0 7px}
.na{font-size:11px;color:#fca5a5;margin-top:5px}.nt{font-size:11px;color:var(--mut);margin-top:5px}
.b-blocked{border-left-color:var(--blk)}.b-in_progress{border-left-color:var(--prog)}.b-in_review{border-left-color:var(--rev)}.b-backlog{border-left-color:var(--p3)}.b-done{border-left-color:var(--ok);opacity:.78}
#chat{grid-area:chat;border-left:1px solid var(--line);display:flex;flex-direction:column;background:var(--panel)}
#chat h2{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--mut);margin:0;padding:12px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
#msgs{flex:1;overflow:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:90%;padding:8px 11px;border-radius:11px;font-size:13px;white-space:pre-wrap;word-wrap:break-word}
.msg.user{align-self:flex-end;background:var(--acc);color:#fff;border-bottom-right-radius:3px}
.msg.jarvis{align-self:flex-start;background:var(--p2);border:1px solid var(--line);border-bottom-left-radius:3px}
.msg .who{font-size:9.5px;opacity:.6;margin-bottom:2px;text-transform:uppercase;letter-spacing:.5px}
.msg .mc{white-space:pre-wrap;word-wrap:break-word}
.mact{display:flex;gap:6px;margin-top:6px}
.mbtn{background:transparent;border:1px solid var(--line);color:var(--mut);border-radius:7px;padding:3px 9px;font-size:11px;font-weight:600;cursor:pointer}
.msg.user .mbtn{border-color:#ffffff66;color:#eef}
.pending{align-self:flex-start;color:var(--mut);font-size:12px;font-style:italic}
.compose{border-top:1px solid var(--line);padding:10px;display:flex;gap:8px;align-items:flex-end}
.compose textarea{resize:none;height:44px;max-height:140px}
.iconbtn{background:var(--p2);border:1px solid var(--line);color:var(--mut);border-radius:9px;padding:10px 13px;font-size:17px;line-height:1}
.iconbtn.rec{background:#ef444422;border-color:#ef4444;color:#fca5a5;animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.45}}
.tts{font-size:11px;padding:5px 9px}
@media(max-width:820px){#app.on{display:flex;flex-direction:column}header{flex:0 0 auto}#pending{flex:0 0 auto;max-height:40vh;overflow:auto}#board{flex:1 1 0;min-height:90px}#chat{flex:1 1 0;min-height:0;border-left:0;border-top:1px solid var(--line)}}
/* change-password modal */
#pwModal{display:none;position:fixed;inset:0;z-index:50;background:rgba(6,9,14,.72);place-items:center;padding:16px}
#pwModal.on{display:grid}
#pwModal .card{width:100%;max-width:330px}
#pwModal .err{color:var(--mut)}
#pwModal .err.bad{color:#fca5a5}
#pwModal .err.ok{color:#86efac}
</style></head><body>

<div id="login">
  <form class="card" id="loginForm">
    <h1><span class="logo">J</span> Jarvis</h1>
    <p style="color:var(--mut);font-size:12.5px;margin-top:0">Your board. Sign in to continue.</p>
    <div style="display:flex;flex-direction:column;gap:9px">
      <input id="email" type="email" placeholder="email" autocomplete="username"/>
      <input id="pass" type="password" placeholder="password" autocomplete="current-password"/>
      <button id="loginBtn" type="submit">Sign in</button>
      <a href="#" id="forgotLink" style="color:var(--mut);font-size:12px;text-align:center;text-decoration:none">Forgot password?</a>
      <div class="err" id="loginErr"></div>
    </div>
  </form>
</div>

<div id="app">
  <header>
    <span class="logo">J</span>
    <div><h1>JARVIS</h1><div class="sub">PM · QA · your board — <span id="count"></span></div></div>
    <div class="views"><button class="vchip on" data-sec="pending" title="Toggle Pending">⏳</button><button class="vchip on" data-sec="board" title="Toggle Board">📋</button><button class="vchip on" data-sec="chat" title="Toggle Chat">💬</button></div>
    <span class="spacer"></span>
    <button class="ghost tts" id="ttsBtn" title="Read Jarvis replies aloud">🔇 Read: Off</button>
    <button class="ghost" id="refreshBtn">↻ Refresh</button>
    <button class="ghost" id="pwBtn" title="Change password">⚙︎</button>
    <button class="ghost" id="logoutBtn">Sign out</button>
  </header>
  <div id="pending"></div>
  <div id="board"></div>
  <div id="chat">
    <h2><span>Ask Jarvis</span></h2>
    <div id="msgs"></div>
    <form class="compose" id="composeForm">
      <button class="iconbtn" id="micBtn" type="button" title="Hold-free voice: tap to talk, tap to stop">🎤</button>
      <textarea id="prompt" placeholder="Ask Jarvis or 🎤 tap to talk… (Enter to send)"></textarea>
      <button id="sendBtn" type="submit">Send</button>
    </form>
  </div>
</div>

<div id="pwModal">
  <form class="card" id="pwForm">
    <h1><span class="logo">J</span> <span id="pwTitle">Change password</span></h1>
    <p id="pwSub" style="color:var(--mut);font-size:12.5px;margin-top:0">Set a new password for this board.</p>
    <div style="display:flex;flex-direction:column;gap:9px">
      <input id="pwNew" type="password" placeholder="new password" autocomplete="new-password"/>
      <input id="pwConfirm" type="password" placeholder="confirm new password" autocomplete="new-password"/>
      <button id="pwSave" type="submit">Update password</button>
      <button class="ghost" id="pwCancel" type="button">Cancel</button>
      <div class="err" id="pwMsg"></div>
    </div>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL="https://yyagoafmnzvyzhuckomf.supabase.co";
const ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl5YWdvYWZtbnp2eXpodWNrb21mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NzQ5OTYsImV4cCI6MjA5ODI1MDk5Nn0.f_cKxXLw2JJ_E5Mf0NThaTahaZqtu-JElu-MDvf0a8s";
const sb=supabase.createClient(SUPABASE_URL,ANON);
const COLS=[["blocked","🔴 Blocked / Needs you"],["in_progress","🟡 In Progress"],["in_review","🔵 In Review"],["backlog","⚪ Backlog"],["done","✅ Done"]];
const $=s=>document.querySelector(s);
let tickets=[],msgs=[],lastMsgCount=0;

async function boot(){
  const {data:{session}}=await sb.auth.getSession();
  if(session){showApp();} else {$("#login").style.display="grid";$("#app").style.display="none";}
}
$("#loginForm").addEventListener("submit",async e=>{
  e.preventDefault();$("#loginErr").style.color="";$("#loginErr").textContent="";$("#loginBtn").disabled=true;
  const {error}=await sb.auth.signInWithPassword({email:$("#email").value.trim(),password:$("#pass").value});
  $("#loginBtn").disabled=false;
  if(error){$("#loginErr").textContent=error.message;} else {showApp();}
});
/* ---- forgot password (send reset email) ---- */
$("#forgotLink").addEventListener("click",async e=>{
  e.preventDefault();
  const email=$("#email").value.trim();
  const err=$("#loginErr");
  if(!email){err.style.color="";err.textContent="Enter your email above, then tap Forgot password.";$("#email").focus();return;}
  err.style.color="";err.textContent="Sending reset link…";
  const {error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:'https://jarvis-d2s.pages.dev/'});
  if(error){err.style.color="";err.textContent=error.message;}
  else{err.style.color="#86efac";err.textContent="Check your email for a reset link.";}
});
$("#logoutBtn").addEventListener("click",async()=>{await sb.auth.signOut();location.reload();});
$("#refreshBtn").addEventListener("click",load);

/* ---- change password (also reused for email recovery: "Set a new password") ---- */
let recoveryMode=false;
function pwSetMsg(t,cls){const m=$("#pwMsg");m.textContent=t;m.className="err"+(cls?" "+cls:"");}
function openPw(recovery){
  recoveryMode=!!recovery;
  $("#pwTitle").textContent=recoveryMode?"Set a new password":"Change password";
  $("#pwSub").textContent=recoveryMode?"Choose a new password to finish signing in.":"Set a new password for this board.";
  $("#pwCancel").style.display=recoveryMode?"none":"";
  $("#pwNew").value="";$("#pwConfirm").value="";pwSetMsg("");$("#pwModal").classList.add("on");$("#pwNew").focus();
}
function closePw(){$("#pwModal").classList.remove("on");}
$("#pwBtn").addEventListener("click",()=>openPw(false));
$("#pwCancel").addEventListener("click",closePw);
$("#pwModal").addEventListener("click",e=>{if(e.target===$("#pwModal")&&!recoveryMode)closePw();});
document.addEventListener("keydown",e=>{if(e.key==="Escape"&&!recoveryMode&&$("#pwModal").classList.contains("on"))closePw();});
/* Detect the email reset link: Supabase fires PASSWORD_RECOVERY once it parses the URL hash */
sb.auth.onAuthStateChange((event)=>{if(event==="PASSWORD_RECOVERY")openPw(true);});
$("#pwForm").addEventListener("submit",async e=>{
  e.preventDefault();
  const p1=$("#pwNew").value,p2=$("#pwConfirm").value;
  if(p1.length<8){pwSetMsg("Password must be at least 8 characters.","bad");return;}
  if(p1!==p2){pwSetMsg("Passwords don’t match.","bad");return;}
  $("#pwSave").disabled=true;pwSetMsg("Updating…");
  const {error}=await sb.auth.updateUser({password:p1});
  $("#pwSave").disabled=false;
  if(error){pwSetMsg(error.message,"bad");}
  else{pwSetMsg("Password updated ✓","ok");
    if(recoveryMode){setTimeout(()=>{closePw();recoveryMode=false;try{history.replaceState(null,"",location.pathname);}catch(_){}showApp();},900);}
    else setTimeout(closePw,1200);}
});

function showApp(){$("#login").style.display="none";$("#app").style.display="";$("#app").classList.add("on");applyViews();load();if(!window._iv)window._iv=setInterval(load,4000);}
function applyViews(){["pending","board","chat"].forEach(s=>{const hid=localStorage.getItem("hide-"+s)==="1";$("#app").classList.toggle("hide-"+s,hid);const c=document.querySelector('.vchip[data-sec="'+s+'"]');if(c)c.classList.toggle("on",!hid);});}
document.querySelectorAll(".vchip").forEach(c=>c.addEventListener("click",()=>{const s=c.dataset.sec;const hid=$("#app").classList.toggle("hide-"+s);localStorage.setItem("hide-"+s,hid?"1":"0");c.classList.toggle("on",!hid);}));

async function load(){
  const [{data:t},{data:m}]=await Promise.all([
    sb.from("jarvis_tickets").select("*").order("status").order("sort"),
    sb.from("jarvis_messages").select("*").order("created_at"),
  ]);
  if(t)tickets=t; if(m)msgs=m;
  renderPending(); renderBoard(); renderChat();
}

function renderPending(){
  const wrap=$("#pending");
  const groups=[
    {key:"blocked",label:"⏳ Pending your answer",cls:""},
    {key:"at_computer",label:"🖥️ When you’re at the computer",cls:"comp"}
  ];
  wrap.innerHTML="";let any=false;
  groups.forEach(g=>{
    const items=tickets.filter(x=>x.status===g.key);
    if(!items.length)return;any=true;
    const grp=document.createElement("div");grp.className="pgrp "+g.cls;
    grp.innerHTML=`<div class="ph">${g.label} <span class="n">${items.length}</span></div><div class="pq"></div>`;
    const pq=grp.querySelector(".pq");
    items.forEach(t=>{
      const b=document.createElement("button");b.className="qcard";
      b.innerHTML=`<div class="qid">${t.id} · ${esc(t.product||"")}</div><div class="qt">${esc(t.title)}</div>${t.next_action?`<div class="qa">▸ ${esc(t.next_action)}</div>`:(t.note?`<div class="qa">${esc(t.note)}</div>`:"")}<div class="qans">Tap to answer →</div>`;
      b.addEventListener("click",()=>{$("#prompt").value=`Re ${t.id} (${t.title}): `;$("#prompt").focus();});
      pq.appendChild(b);
    });
    wrap.appendChild(grp);
  });
  wrap.style.display=any?"block":"none";
}

function renderBoard(){
  const b=$("#board");b.innerHTML="";
  let open=0;
  COLS.forEach(([key,label])=>{
    const items=tickets.filter(x=>x.status===key);
    if(key!=="done")open+=items.length;
    const col=document.createElement("section");col.className="col";
    col.innerHTML=`<h2>${label}<span class="n">${items.length}</span></h2>`;
    const drop=document.createElement("div");drop.className="drop";drop.dataset.status=key;
    drop.addEventListener("dragover",e=>{e.preventDefault();drop.classList.add("over");});
    drop.addEventListener("dragleave",()=>drop.classList.remove("over"));
    drop.addEventListener("drop",async e=>{e.preventDefault();drop.classList.remove("over");
      const id=e.dataTransfer.getData("text");if(!id)return;
      const tk=tickets.find(x=>x.id===id);if(tk&&tk.status!==key){tk.status=key;renderPending();renderBoard();
        await sb.from("jarvis_tickets").update({status:key,updated_at:new Date().toISOString()}).eq("id",id);
        await sb.from("jarvis_messages").insert({role:"user",content:`[board] moved ${id} → ${key}`,ticket_id:id,handled:true});
      }});
    items.forEach(tk=>{
      const c=document.createElement("div");c.className=`tk b-${key}`;c.draggable=true;
      c.addEventListener("dragstart",e=>e.dataTransfer.setData("text",tk.id));
      c.addEventListener("click",()=>{$("#prompt").value=`About ${tk.id} (${tk.title}): `;$("#prompt").focus();});
      c.innerHTML=`<div class="id">${tk.id} · ${tk.product||""}</div><div class="t">${esc(tk.title)}</div>
        <div class="m"><span class="tag ${tk.priority}">${tk.priority}</span>${tk.owner?`<span class="own">${esc(tk.owner)}</span>`:""}</div>
        ${tk.next_action?`<div class="na">▸ ${esc(tk.next_action)}</div>`:""}${tk.note?`<div class="nt">${esc(tk.note)}</div>`:""}`;
      drop.appendChild(c);
    });
    col.appendChild(drop);b.appendChild(col);
  });
  $("#count").textContent=`${open} open · ${tickets.length} total`;
}

/* ---- read-aloud (TTS) ---- */
let ttsOn=localStorage.getItem("tts")==="1";
const spoken=new Set();let ttsPrimed=false;
function updateTtsBtn(){const b=$("#ttsBtn");b.classList.toggle("active",ttsOn);b.textContent=ttsOn?"🔊 Read: On":"🔇 Read: Off";}
$("#ttsBtn").addEventListener("click",()=>{ttsOn=!ttsOn;localStorage.setItem("tts",ttsOn?"1":"0");
  if(!ttsOn){try{speechSynthesis.cancel();}catch(e){}}updateTtsBtn();});
function speakNew(){if(!ttsOn||!("speechSynthesis"in window))return;
  msgs.filter(m=>m.role==="jarvis"&&!spoken.has(m.id)).forEach(m=>{spoken.add(m.id);
    try{const u=new SpeechSynthesisUtterance((m.content||"").replace(/https?:\/\/\S+/g,"link"));u.rate=1.03;speechSynthesis.speak(u);}catch(e){}});}

function renderChat(){
  const box=$("#msgs");const atBottom=box.scrollHeight-box.scrollTop-box.clientHeight<60;
  box.innerHTML="";
  msgs.filter(m=>!(m.content||"").startsWith("[board]")).forEach(m=>{
    const d=document.createElement("div");d.className="msg "+(m.role==="user"?"user":"jarvis");
    d.innerHTML=`<div class="who">${m.role==="user"?"You":"Jarvis"}</div><div class="mc">${esc(m.content)}</div><div class="mact"><button class="mbtn" data-act="reply">↩ Reply</button><button class="mbtn" data-act="read">🔊 Read</button><button class="mbtn" data-act="copy">⧉ Copy</button></div>`;
    box.appendChild(d);
  });
  const unhandled=msgs.some(m=>m.role==="user"&&!m.handled&&!(m.content||"").startsWith("[board]"));
  if(unhandled){const p=document.createElement("div");p.className="pending";p.textContent="Jarvis is on it…";box.appendChild(p);}
  if(atBottom||msgs.length!==lastMsgCount)box.scrollTop=box.scrollHeight;
  lastMsgCount=msgs.length;
  if(!ttsPrimed){msgs.filter(m=>m.role==="jarvis").forEach(m=>spoken.add(m.id));ttsPrimed=true;} else {speakNew();}
}

/* ---- voice-to-text (STT) ---- */
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;let rec=null,recording=false;
$("#micBtn").addEventListener("click",()=>{
  if(!SR){alert("Voice input isn’t supported on this browser — type instead. (On iPhone this can be hit-or-miss.)");return;}
  if(recording){try{rec.stop();}catch(e){}return;}
  rec=new SR();rec.lang="en-US";rec.interimResults=true;rec.continuous=false;let fin="";
  rec.onstart=()=>{recording=true;$("#micBtn").classList.add("rec");};
  rec.onerror=()=>{recording=false;$("#micBtn").classList.remove("rec");};
  rec.onend=()=>{recording=false;$("#micBtn").classList.remove("rec");$("#prompt").focus();};
  rec.onresult=e=>{let interim="";for(let i=e.resultIndex;i<e.results.length;i++){const tr=e.results[i][0].transcript;if(e.results[i].isFinal)fin+=tr+" ";else interim+=tr;}$("#prompt").value=(fin+interim).trim();};
  try{rec.start();}catch(e){}
});

$("#msgs").addEventListener("click",e=>{
  const btn=e.target.closest(".mbtn");if(!btn)return;
  const txt=btn.closest(".msg").querySelector(".mc").textContent;
  if(btn.dataset.act==="reply"){const s=txt.slice(0,55).replace(/\s+/g," ");$("#prompt").value=`↳ Re "${s}${txt.length>55?"…":""}": `;$("#prompt").focus();return;}
  if(btn.dataset.act==="read"){try{speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(txt.replace(/https?:\/\/\S+/g,"link"));u.rate=1.03;speechSynthesis.speak(u);}catch(_){}}
  else{const done=()=>{const o=btn.textContent;btn.textContent="✓ Copied";setTimeout(()=>btn.textContent=o,1200);};
    if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(done).catch(()=>selFallback(btn));}else selFallback(btn);}
});
function selFallback(btn){const r=document.createRange();r.selectNodeContents(btn.closest(".msg").querySelector(".mc"));const s=getSelection();s.removeAllRanges();s.addRange(r);try{document.execCommand("copy");const o=btn.textContent;btn.textContent="✓ Copied";setTimeout(()=>btn.textContent=o,1200);}catch(_){}}
$("#composeForm").addEventListener("submit",send);
$("#prompt").addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send(e);}});
async function send(e){e.preventDefault();const v=$("#prompt").value.trim();if(!v)return;
  if(recording){try{rec.stop();}catch(e){}}
  $("#prompt").value="";$("#sendBtn").disabled=true;
  await sb.from("jarvis_messages").insert({role:"user",content:v,handled:false});
  $("#sendBtn").disabled=false;await load();}

function esc(s){return (s??"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
updateTtsBtn();
boot();
</script></body></html>
